name: Fast Tests (Schema Guard + Pure-sh/jq Suites)

# H3 (code-review finding, docs/rfc-apk-arch-coverage.md §5.2 "a typo hard-
# fails CI, not the feed"): before this workflow existed, NOTHING in CI ever
# ran `arches.sh --validate` or almost any of tests/apk/* -- a bad
# arches.json edit (a typo'd enum, an unmapped tuple, a shell-unsafe
# `.name`, ...) went straight through to the 14-family docker build matrix
# and a live feed publish with zero gate. This workflow is that gate: on
# every push and pull_request, it runs the CHEAP, non-docker/non-qemu
# guards (the schema validator + the pure-sh/jq test suites) so a bad edit
# fails fast, in seconds, long before any build/publish job would ever see
# it.
#
# Every suite listed in the `fast-tests` job below was verified to run
# standalone, hermetically (no docker, no qemu, no live network) and pass
# green on a clean checkout before being added here.
#
# `compile-negative` is a SEPARATE job: it's cheap in wall-clock terms
# (jobs run in parallel, not gated behind fast-tests) but it needs docker +
# network (it builds the real tailscale-package/Dockerfile `build` stage
# against a pinned Tailscale source tarball) -- a materially different
# dependency footprint than the pure-sh/jq suites above, so it stays a
# separate, clearly-labeled job rather than folding into fast-tests' own
# otherwise-hermetic step list.
#
# `apk-hermetic-docker-tests` is likewise SEPARATE, same reason: both
# tests/apk/feed-publish.sh and tests/apk/resolve-install-smoke.sh need the
# pinned host apk-tools binary (tests/apk/lib.sh's
# extract_apk_tools_binary, a `docker build` against the cached
# `apk-tools` Dockerfile stage) to drive real `apk mkpkg`/`mkndx`/`add`
# commands -- no qemu, no rootfs container, no live production feed, but
# not the pure-sh/jq footprint of the `fast-tests` job above either. This
# is where FU1 (feed-publish.sh's pre-deploy local-verify regression proof
# for the 527e826 filename-suffix bug) and FU2 (resolve-install-smoke.sh's
# hermetic by-name resolution proof, the tests/apk/install.sh direct-path
# blind spot) live in CI.
#
# Deliberately NOT included in this workflow (not in scope for a "fast,
# cheap, every-push" gate):
#   - qemu/rootfs-boot verification (tests/apk/qemu.sh, rootfs.sh,
#     fpu-sigill-smoke.sh, install-native-verify.sh, ...) -- needs
#     --privileged docker + qemu-user binfmt registration, materially more
#     expensive, and already exercised by build-tailscale.yaml's own
#     qemu-verify job on every PR/dispatch.
#   - tests/apk/install-dispatch.sh -- its Part 4 is a KNOWN pre-existing
#     baseline failure, unrelated to arches.json/publish changes; wiring it
#     in here would start this required gate red on day one, so it is left
#     out until that pre-existing failure is fixed separately.
#   - tests/apk/mkpkg.sh, host-apk.sh, instroot.sh, legacy-identical.sh,
#     release-*.sh, upgrade-downgrade.sh, guard-hardening.sh,
#     failure-isolation.sh, install.sh, install-verify.sh,
#     apk-matrix.sh/ipk-matrix.sh -- docker/qemu-heavy or otherwise out of
#     this workflow's cheap-guard scope; candidates for a follow-up
#     "full/slow" required-checks workflow, not bundled in here.

on:
  push:
  pull_request:

jobs:
  fast-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: arches.sh --validate (arches.json schema guard -- M1's .name charclass check lives here)
        run: sh scripts/arches.sh --validate

      - name: tests/apk/arches.sh
        run: sh tests/apk/arches.sh

      - name: tests/apk/select-matrix.sh
        run: sh tests/apk/select-matrix.sh

      - name: tests/apk/republish-arches.sh
        run: sh tests/apk/republish-arches.sh

      - name: tests/apk/publish-feed.sh
        run: sh tests/apk/publish-feed.sh

      - name: tests/apk/publish-arch.sh
        run: sh tests/apk/publish-arch.sh

      - name: tests/apk/install-arch-block.sh
        run: sh tests/apk/install-arch-block.sh

      - name: tests/apk/docs-arch-coverage.sh
        run: sh tests/apk/docs-arch-coverage.sh

      - name: tests/apk/arch-drift.sh
        run: sh tests/apk/arch-drift.sh

      - name: tests/apk/dockerfile-goarch-drift.sh
        run: sh tests/apk/dockerfile-goarch-drift.sh

      - name: tests/apk/stage-payload.sh
        run: sh tests/apk/stage-payload.sh

  compile-negative:
    # Separate job (docker + network dependency -- see file header above):
    # builds the real tailscale-package/Dockerfile `build` stage against
    # several deliberately-invalid GOARCH/GOMIPS/GOMIPS64 build-arg
    # combinations and asserts each one hard-fails (the S2 negative test,
    # RFC §5.1), plus two positive controls proving a valid tuple still
    # builds. Runs in parallel with fast-tests, not gated behind it -- both
    # jobs must succeed for this workflow to report green.
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: tests/apk/compile-negative.sh
        run: sh tests/apk/compile-negative.sh

  apk-hermetic-docker-tests:
    # Separate job (docker dependency, via extract_apk_tools_binary -- see
    # file header above): otherwise fully hermetic -- no qemu, no
    # --privileged docker, no live network beyond what the cached
    # `apk-tools` Docker stage itself needs. Runs in parallel with
    # fast-tests/compile-negative, not gated behind either.
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: tests/apk/feed-publish.sh
        run: sh tests/apk/feed-publish.sh

      - name: tests/apk/resolve-install-smoke.sh
        run: sh tests/apk/resolve-install-smoke.sh
