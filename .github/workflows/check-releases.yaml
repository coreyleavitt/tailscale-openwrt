name: Check for New Tailscale Releases

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 6 AM UTC
  workflow_dispatch:

permissions:
  actions: write
  contents: write  # commit state/last-check.json + keepalive heartbeat

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get latest Tailscale release
        id: tailscale
        run: |
          LATEST=$(curl -s https://api.github.com/repos/tailscale/tailscale/releases/latest | jq -r .tag_name)
          # Strip 'v' prefix for version number
          VERSION="${LATEST#v}"
          echo "tag=$LATEST" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Latest Tailscale release: $LATEST (version: $VERSION)"

      - name: Check if we have a release for this version
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.tailscale.outputs.tag }}"
          # Check if release exists in our repo
          if gh release view "$TAG" --repo ${{ github.repository }} >/dev/null 2>&1; then
            echo "Already have release for $TAG"
            echo "needs_build=false" >> $GITHUB_OUTPUT
          else
            echo "No release found for $TAG - triggering build"
            echo "needs_build=true" >> $GITHUB_OUTPUT
          fi

      - name: Trigger build workflow
        if: steps.check.outputs.needs_build == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.tailscale.outputs.version }}"
          echo "Triggering build for Tailscale $VERSION"
          gh workflow run build-tailscale.yaml \
            --repo ${{ github.repository }} \
            -f tailscale_version="$VERSION" \
            -f pkg_release="1"

      # C5 self-heal + synthetic probe (RFC docs/rfc-apk-builds.md §4.6,
      # slice C5). Both need a real `apk` binary on PATH (adbdump/version -t)
      # -- extracted once here and reused by both steps below, same
      # extract_apk_tools_binary helper the publish-feed workflow job and
      # tests/apk/feed-publish.sh already use (tests/apk/lib.sh, A1).
      #
      # Only when needs_build == 'false' (a release for the latest upstream
      # tag already exists): running the drift/version-currency checks right
      # after triggering a brand-new build would be a guaranteed, meaningless
      # false alarm (the feed cannot possibly reflect a release that doesn't
      # exist yet -- the new build+publish pipeline hasn't even started).
      - name: Extract pinned apk-tools binary (for feed version checks)
        if: steps.check.outputs.needs_build == 'false'
        run: |
          . tests/apk/lib.sh
          extract_apk_tools_binary "${RUNNER_TEMP}/apk-bin" tailscale-package
          echo "${RUNNER_TEMP}/apk-bin" >> "$GITHUB_PATH"

      # Self-heal (RFC §4.6): with apk/ipk failure isolation (C5 above) in
      # place, an apk-path soft-failure no longer fails the ipk release --
      # so the `gh release view` gate above now reads "done" even when apk
      # was never published for that release. This is the other half: does
      # the published feed actually reflect the latest release? Factored
      # into scripts/detect-apk-drift.sh (testable locally, see
      # tests/apk/failure-isolation.sh) rather than inlined here, so the
      # decision logic isn't only exercisable via a live cron run.
      #
      # ARCH selection (RFC docs/rfc-apk-arch-coverage.md §5.8, slice S1c):
      # `.[0].name` was order-fragile -- arches.json widened from 4 to 35
      # rows (S1b) with the mnemonic-id assignment content-derived, not
      # positional, so `.[0]` is no longer guaranteed to be the historical
      # battle-tested probe arch. Key strictly on `canary == true` instead
      # (the same field select-matrix.sh's PR leg keys on) -- this is
      # exactly one arch (mips_24kc) regardless of row order or how many
      # rows get added ahead of it.
      - name: Detect apk feed drift (self-heal check)
        if: steps.check.outputs.needs_build == 'false'
        id: drift
        run: |
          set -eu
          TAG="${{ steps.tailscale.outputs.tag }}"
          ARCH=$(jq -r '.[] | select(.canary == true) | .name' arches.json)
          FEED_URL="https://apk.leavitt.dev/apk/${ARCH}/packages.adb"
          set +e
          OUT=$(sh scripts/detect-apk-drift.sh "${TAG}" "${FEED_URL}" 2>&1)
          RC=$?
          set -e
          echo "${OUT}"
          if [ "${RC}" -eq 1 ]; then
            echo "drift=true" >> "$GITHUB_OUTPUT"
          elif [ "${RC}" -eq 0 ]; then
            echo "drift=false" >> "$GITHUB_OUTPUT"
          else
            # Hard error (network blip, DNS, 5xx) -- refuse to guess. Never
            # auto-republish on an unconfirmed signal (a transient probe
            # failure firing a republish dispatch would itself be a new,
            # confusing failure mode), but still surface it loudly.
            echo "::warning::detect-apk-drift.sh hard-errored (exit ${RC}) -- not auto-republishing on an unconfirmed signal. See the alert below."
            echo "drift=false" >> "$GITHUB_OUTPUT"
            echo "harderror=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Auto-fire republish dispatch (apk self-heal)
        if: steps.drift.outputs.drift == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          ALERT_WEBHOOK_URL: ${{ secrets.ALERT_WEBHOOK_URL }}
        run: |
          set -eu
          TAG="${{ steps.tailscale.outputs.tag }}"
          scripts/notify-alert.sh "apk self-heal: feed missing/stale for release ${TAG} -- auto-firing a republish dispatch (RFC §4.6)"
          gh workflow run build-tailscale.yaml \
            --repo ${{ github.repository }} \
            -f republish=true \
            -f republish_tag="${TAG}"

      - name: Alert on drift-detection hard error
        if: steps.drift.outputs.harderror == 'true'
        env:
          ALERT_WEBHOOK_URL: ${{ secrets.ALERT_WEBHOOK_URL }}
        run: |
          scripts/notify-alert.sh "apk self-heal check could not determine feed drift for ${{ steps.tailscale.outputs.tag }} (transient fetch error) -- investigate manually, no republish was auto-fired"

      # Synthetic feed/cert probe (RFC §4.6): catches SILENT DECAY of the
      # static feed between releases (a Pages custom-domain cert-renewal
      # failure, DNS/CNAME drift, a Pages outage) -- none of which touch a
      # CI job, so nothing else in this pipeline would ever see them.
      # Factored into scripts/probe-feed.sh (testable locally against a
      # self-signed-cert server + a locally-signed feed, see
      # tests/apk/failure-isolation.sh) -- reuses the SAME alert channel as
      # the self-heal check above (RFC: "reuse the alert channel on
      # failure"), not a separate notification path.
      - name: Synthetic feed/cert probe
        if: steps.check.outputs.needs_build == 'false'
        env:
          ALERT_WEBHOOK_URL: ${{ secrets.ALERT_WEBHOOK_URL }}
        run: |
          set +e
          # canary-keyed (RFC §5.8 S1c) -- see the drift-check step above.
          ARCH=$(jq -r '.[] | select(.canary == true) | .name' arches.json)
          TAG="${{ steps.tailscale.outputs.tag }}"
          OUT=$(sh scripts/probe-feed.sh \
            "https://apk.leavitt.dev/apk/${ARCH}" \
            "https://apk.leavitt.dev/apk/keys/tailscale.pem" \
            "${TAG}" 2>&1)
          RC=$?
          echo "${OUT}"
          if [ "${RC}" -ne 0 ]; then
            printf '%s\n' "${OUT}" | scripts/notify-alert.sh "synthetic feed probe FAILED for ${TAG} -- apk.leavitt.dev may be down, mis-certified, or serving a stale/tampered feed"
          fi

      - name: Record check state (keepalive)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Self-commit a small state file so the repo stays active and
          # GitHub never auto-disables this scheduled workflow for 60-day
          # inactivity. A meaningful commit lands whenever the upstream
          # version changes; if the repo has otherwise been quiet for >=14
          # days (well inside the 60-day window), push a heartbeat instead.
          OUR_LATEST=$(gh release view --repo ${{ github.repository }} \
            --json tagName --jq .tagName 2>/dev/null || echo "none")
          mkdir -p state
          cat > state/last-check.json <<EOF
          {
            "upstream_latest": "${{ steps.tailscale.outputs.tag }}",
            "our_latest_release": "${OUR_LATEST}",
            "needs_build": ${{ steps.check.outputs.needs_build }}
          }
          EOF

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state/last-check.json

          AGE_DAYS=$(( ( $(date -u +%s) - $(git log -1 --format=%ct) ) / 86400 ))
          if git diff --cached --quiet; then
            if [ "$AGE_DAYS" -lt 14 ]; then
              echo "State unchanged, repo active ${AGE_DAYS}d ago; nothing to do."
              exit 0
            fi
            echo "State unchanged but repo idle ${AGE_DAYS}d; pushing heartbeat."
            git commit --allow-empty \
              -m "chore(check): keepalive heartbeat (idle ${AGE_DAYS}d)"
          else
            git commit \
              -m "chore(check): upstream ${{ steps.tailscale.outputs.tag }}"
          fi

          for attempt in 1 2 3; do
            if git pull --rebase origin "${GITHUB_REF_NAME}" && git push; then
              exit 0
            fi
            echo "Push attempt ${attempt} failed; retrying."
            sleep $(( attempt * 3 ))
          done
          echo "ERROR: failed to push state after 3 attempts" >&2
          exit 1
